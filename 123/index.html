<!doctype html>
<html lang="en">
  <head>
    <title>BATRSACO Fleet Dashboard</title>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body class="mainBody">
    <div class="naviBar">
      <h2>Fleet Monitoring Dashboard</h2>
      <div class="navbutton">
        <a href="#">HOME</a>
        <a href="vehicle.html">VEHICLES</a>
        <a href="reports.html">REPORTS</a>
        <a href="settings.html">SETTINGS</a>
      </div>
    </div>

    <div class="status-cards-container">
      <div class="status-card">
        <h4>Active Vehicles</h4>
        <p class="card-value">1 / 1</p>
      </div>
      <div class="status-card">
        <h4>4G LTE Signal</h4>
        <p class="card-value">Excellent</p>
      </div>
      <div class="status-card">
        <h4>System Alerts</h4>
        <p class="card-value alert">No Warnings</p>
      </div>
    </div>

    <div class="dashboard-content">
      <div class="Randombackforgps">
        <h3>GPS Tracking</h3>
        <div class="gpsTracking">
          <iframe
            src="https://maps.google.com/maps?q=Lipa%20City,%20Batangas,%20Philippines&t=&z=13&ie=UTF8&iwloc=&output=embed"
            title="Lipa City GPS Map"
          >
          </iframe>
        </div>
      </div>

      <div class="captureVideo">
        <h3>Recent Event Video</h3>
        <div class="capturedEvent">
          <p style="text-align: center; padding-top: 230px; color: #777">
            Awaiting Video Feed...
          </p>
        </div>
      </div>
    </div>
  </body>
</html>
