<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login - BATRSACO Fleet Dashboard</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{min-height:100vh;background:#0a0e1a;display:flex;align-items:center;justify-content:center;font-family:'Courier New',monospace;overflow:hidden}
    .bg{position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(20,40,80,0.6) 0%,transparent 60%),radial-gradient(ellipse at 80% 20%,rgba(10,30,60,0.5) 0%,transparent 50%),#0a0e1a;z-index:0}
    .grid{position:fixed;inset:0;background-image:linear-gradient(rgba(30,80,160,0.07) 1px,transparent 1px),linear-gradient(90deg,rgba(30,80,160,0.07) 1px,transparent 1px);background-size:40px 40px;z-index:1;animation:gridShift 20s linear infinite}
    @keyframes gridShift{from{transform:translateY(0)}to{transform:translateY(40px)}}
    .wrap{position:relative;z-index:10;width:420px;padding:16px}
    .card{background:rgba(8,14,28,0.92);border:1px solid rgba(40,100,200,0.25);border-radius:16px;padding:40px 36px;backdrop-filter:blur(20px)}
    .logo-row{display:flex;align-items:center;gap:14px;margin-bottom:6px}
    .logo-icon{width:44px;height:44px;background:linear-gradient(135deg,#1a4fa0,#0d2d6b);border:1px solid rgba(60,140,255,0.3);border-radius:10px;display:flex;align-items:center;justify-content:center}
    .logo-icon svg{width:24px;height:24px}
    .brand{font-size:22px;font-weight:700;color:#e8f0ff;letter-spacing:2px}
    .tagline{font-size:11px;color:rgba(100,160,255,0.6);letter-spacing:1px;margin-bottom:32px;margin-left:58px;text-transform:uppercase}
    .security-badge{display:flex;align-items:center;gap:6px;background:rgba(0,180,80,0.08);border:1px solid rgba(0,180,80,0.2);border-radius:6px;padding:6px 10px;margin-bottom:28px;width:fit-content}
    .badge-dot{width:6px;height:6px;border-radius:50%;background:#00c853;animation:pulse 2s ease infinite}
    @keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(0.8)}}
    .badge-text{font-size:10px;color:#00c853;letter-spacing:1px;text-transform:uppercase}
    label{display:block;font-size:10px;color:rgba(100,150,255,0.7);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:7px}
    .field{margin-bottom:18px}
    .input-wrap{position:relative}
    input[type=text],input[type=password]{width:100%;background:rgba(15,25,50,0.8);border:1px solid rgba(40,100,200,0.2);border-radius:8px;padding:11px 40px 11px 14px;color:#c8d8ff;font-size:14px;font-family:inherit;outline:none;transition:border .2s,box-shadow .2s}
    input:focus{border-color:rgba(60,140,255,0.5);box-shadow:0 0 0 3px rgba(40,100,200,0.1)}
    input::placeholder{color:rgba(60,100,180,0.35)}
    .eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(80,130,220,0.5);padding:0;display:flex;align-items:center;transition:color .2s}
    .eye-btn:hover{color:rgba(100,160,255,0.8)}
    .strength-bar{height:3px;background:rgba(40,100,200,0.1);border-radius:2px;margin-top:6px;overflow:hidden}
    .strength-fill{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
    .row{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px}
    .remember{display:flex;align-items:center;gap:8px;cursor:pointer;font-size:12px;color:rgba(100,150,220,0.6)}
    .remember input{display:none}
    .check-box{width:16px;height:16px;border:1px solid rgba(60,130,255,0.3);border-radius:4px;display:flex;align-items:center;justify-content:center;transition:all .2s;flex-shrink:0}
    .remember input:checked ~ .check-box{background:rgba(40,100,220,0.4);border-color:rgba(80,150,255,0.6)}
    .check-mark{display:none;width:10px;height:10px}
    .remember input:checked ~ .check-box .check-mark{display:block}
    .forgot{font-size:12px;color:rgba(80,140,255,0.5);text-decoration:none;letter-spacing:.5px;transition:color .2s}
    .forgot:hover{color:rgba(100,170,255,0.8)}
    .submit-btn{width:100%;padding:13px;background:linear-gradient(135deg,#1a4fa0,#0d2d6b);border:1px solid rgba(60,140,255,0.25);border-radius:8px;color:#c8d8ff;font-size:13px;font-family:inherit;letter-spacing:2px;text-transform:uppercase;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
    .submit-btn:hover{background:linear-gradient(135deg,#2060c0,#1040a0);box-shadow:0 4px 20px rgba(30,80,200,0.3)}
    .submit-btn:active{transform:scale(0.99)}
    .submit-btn:disabled{opacity:.5;cursor:not-allowed}
    .err-msg{font-size:11px;color:#ff6b6b;margin-top:4px;min-height:16px;letter-spacing:.5px}
    .lockout-banner{background:rgba(255,50,50,0.08);border:1px solid rgba(255,80,80,0.2);border-radius:8px;padding:10px 14px;margin-bottom:16px;font-size:11px;color:#ff8888;letter-spacing:.5px;display:none}
    .attempts-left{font-size:10px;color:rgba(255,140,60,0.6);text-align:right;margin-top:4px;letter-spacing:.5px}
    .divider{display:flex;align-items:center;gap:12px;margin:24px 0 0;color:rgba(50,90,170,0.3);font-size:11px}
    .divider::before,.divider::after{content:'';flex:1;height:1px;background:rgba(40,80,160,0.15)}
    .footer-note{text-align:center;font-size:10px;color:rgba(60,100,180,0.35);letter-spacing:1px;margin-top:14px;text-transform:uppercase}
    .spinner{display:none;width:16px;height:16px;border:2px solid rgba(200,220,255,0.2);border-top-color:#8ab4ff;border-radius:50%;animation:spin .6s linear infinite;margin:0 auto}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>

<div class="bg"></div>
<div class="grid"></div>

<div class="wrap">
  <div class="card">
    <div class="logo-row">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2L3 7v5c0 5.25 3.75 10.15 9 11.35C17.25 22.15 21 17.25 21 12V7L12 2z" stroke="#4a90e2" stroke-width="1.5" stroke-linejoin="round"/>
          <path d="M9 12l2 2 4-4" stroke="#4a90e2" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>
      <div class="brand">BATRSACO</div>
    </div>
    <div class="tagline">Fleet Monitoring System</div>

    <div class="security-badge">
      <div class="badge-dot"></div>
      <span class="badge-text">Secure Connection</span>
    </div>

    <div class="lockout-banner" id="lockoutBanner">Account temporarily locked. Too many failed attempts.</div>

    <div class="field">
      <label for="username">Username or Email</label>
      <div class="input-wrap">
        <input type="text" id="username" name="username" placeholder="Enter username or email"
          autocomplete="username" maxlength="128" spellcheck="false" autocapitalize="off"/>
      </div>
      <div class="err-msg" id="usernameErr"></div>
    </div>

    <div class="field">
      <label for="password">Password</label>
      <div class="input-wrap">
        <input type="password" id="password" name="password" placeholder="Enter your password"
          autocomplete="current-password" maxlength="128"/>
        <button class="eye-btn" id="eyeBtn" type="button" aria-label="Toggle password visibility">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <div class="strength-bar"><div class="strength-fill" id="strengthFill"></div></div>
      <div class="err-msg" id="passwordErr"></div>
    </div>

    <div class="row">
      <label class="remember">
        <input type="checkbox" id="remember">
        <span class="check-box">
          <svg class="check-mark" viewBox="0 0 10 10" fill="none" stroke="#8ab4ff" stroke-width="2" stroke-linecap="round">
            <polyline points="1.5,5 4,7.5 8.5,2.5"/>
          </svg>
        </span>
        Remember me
      </label>
      <a href="#" class="forgot" id="forgotLink">Forgot Password?</a>
    </div>

    <div class="attempts-left" id="attemptsLeft"></div>

    <button class="submit-btn" id="loginBtn" type="button">
      <span id="btnText">Sign In</span>
      <div class="spinner" id="spinner"></div>
    </button>

    <div class="divider">secured by tls 1.3</div>
    <div class="footer-note" id="sessionNote">Session expires after 30 min of inactivity</div>
  </div>
</div>

<script>
  const MAX_ATTEMPTS = 5;
  const LOCKOUT_DURATION = 15 * 60 * 1000;
  const LOCKOUT_KEY = 'batrsaco_lockout';
  const ATTEMPTS_KEY = 'batrsaco_attempts';

  let attempts = parseInt(sessionStorage.getItem(ATTEMPTS_KEY) || '0');
  let eyeVisible = false;

  const usernameInput = document.getElementById('username');
  const passwordInput = document.getElementById('password');
  const loginBtn = document.getElementById('loginBtn');
  const btnText = document.getElementById('btnText');
  const spinner = document.getElementById('spinner');
  const usernameErr = document.getElementById('usernameErr');
  const passwordErr = document.getElementById('passwordErr');
  const attemptsLeft = document.getElementById('attemptsLeft');
  const lockoutBanner = document.getElementById('lockoutBanner');
  const eyeBtn = document.getElementById('eyeBtn');
  const eyeIcon = document.getElementById('eyeIcon');

  function isLockedOut() {
    const lockoutUntil = sessionStorage.getItem(LOCKOUT_KEY);
    if (!lockoutUntil) return false;
    if (Date.now() < parseInt(lockoutUntil)) return true;
    sessionStorage.removeItem(LOCKOUT_KEY);
    sessionStorage.setItem(ATTEMPTS_KEY, '0');
    attempts = 0;
    return false;
  }

  function checkLockout() {
    if (isLockedOut()) {
      lockoutBanner.style.display = 'block';
      loginBtn.disabled = true;
      usernameInput.disabled = true;
      passwordInput.disabled = true;
      const remaining = Math.ceil((parseInt(sessionStorage.getItem(LOCKOUT_KEY)) - Date.now()) / 60000);
      lockoutBanner.textContent = `Account locked. Try again in ${remaining} minute${remaining !== 1 ? 's' : ''}.`;
      attemptsLeft.textContent = '';
    }
  }

  function sanitize(str) {
    return str.replace(/[<>"'&]/g, '');
  }

  function validateUsername(val) {
    val = val.trim();
    if (!val) return 'Username or email is required.';
    if (val.length < 3) return 'Must be at least 3 characters.';
    if (val.length > 128) return 'Too long.';
    if (/[<>"']/.test(val)) return 'Invalid characters.';
    return '';
  }

  function validatePassword(val) {
    if (!val) return 'Password is required.';
    if (val.length < 8) return 'Must be at least 8 characters.';
    return '';
  }

  function getStrength(pw) {
    let s = 0;
    if (pw.length >= 8) s++;
    if (pw.length >= 12) s++;
    if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) s++;
    if (/[0-9]/.test(pw)) s++;
    if (/[^A-Za-z0-9]/.test(pw)) s++;
    return s;
  }

  passwordInput.addEventListener('input', () => {
    const pw = passwordInput.value;
    const s = getStrength(pw);
    const fill = document.getElementById('strengthFill');
    const colors = ['','#e53935','#fb8c00','#fdd835','#43a047','#00c853'];
    const widths = [0, 20, 40, 60, 80, 100];
    fill.style.width = pw ? widths[Math.min(s,5)] + '%' : '0';
    fill.style.background = pw ? colors[Math.min(s,5)] : '';
    if (passwordErr.textContent) {
      passwordErr.textContent = validatePassword(pw);
    }
  });

  usernameInput.addEventListener('input', () => {
    if (usernameErr.textContent) {
      usernameErr.textContent = validateUsername(usernameInput.value);
    }
  });

  eyeBtn.addEventListener('click', () => {
    eyeVisible = !eyeVisible;
    passwordInput.type = eyeVisible ? 'text' : 'password';
    eyeIcon.innerHTML = eyeVisible
      ? '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>'
      : '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
  });

  [usernameInput, passwordInput].forEach(inp => {
    inp.addEventListener('paste', () => {
      setTimeout(() => { inp.value = sanitize(inp.value); }, 0);
    });
  });

  loginBtn.addEventListener('click', async () => {
    if (isLockedOut()) { checkLockout(); return; }

    const uVal = usernameInput.value.trim();
    const pVal = passwordInput.value;

    const uErr = validateUsername(uVal);
    const pErr = validatePassword(pVal);
    usernameErr.textContent = uErr;
    passwordErr.textContent = pErr;
    if (uErr || pErr) return;

    btnText.style.display = 'none';
    spinner.style.display = 'block';
    loginBtn.disabled = true;

    // Replace this block with your actual backend auth fetch() call
    await new Promise(r => setTimeout(r, 1200));
    const success = uVal.toLowerCase() === 'admin' && pVal === 'Fleet@2024!';

    btnText.style.display = 'block';
    spinner.style.display = 'none';
    loginBtn.disabled = false;

    if (success) {
      sessionStorage.setItem(ATTEMPTS_KEY, '0');
      attempts = 0;
      attemptsLeft.textContent = '';
      btnText.textContent = 'Access Granted';
      loginBtn.style.background = 'linear-gradient(135deg,#0a5c30,#063d20)';
      loginBtn.style.borderColor = 'rgba(0,200,100,0.3)';
      document.getElementById('sessionNote').textContent = 'Redirecting to dashboard...';
      // window.location.href = 'index.html'; // Uncomment to redirect
    } else {
      attempts++;
      sessionStorage.setItem(ATTEMPTS_KEY, String(attempts));
      const remaining = MAX_ATTEMPTS - attempts;
      if (attempts >= MAX_ATTEMPTS) {
        sessionStorage.setItem(LOCKOUT_KEY, String(Date.now() + LOCKOUT_DURATION));
        checkLockout();
      } else {
        passwordErr.textContent = 'Invalid username or password.';
        attemptsLeft.textContent = `${remaining} attempt${remaining !== 1 ? 's' : ''} remaining before lockout`;
        passwordInput.value = '';
        passwordInput.focus();
        document.getElementById('strengthFill').style.width = '0';
      }
    }
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') loginBtn.click();
  });

  checkLockout();
</script>
</body>
</html>
